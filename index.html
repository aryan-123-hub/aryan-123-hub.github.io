<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aryan M M — TypeScript Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono&family=DM+Sans&display=swap" rel="stylesheet"/>

<style>
/* ===== YOUR ORIGINAL CSS (SHORTENED ONLY IMPORTANT PARTS MODIFIED) ===== */

:root {
  --bg: #060810;
  --bg2: #0c1020;
  --accent: #4f8ef7;
  --accent2: #7b5cfa;
  --accent3: #00e5c8;
  --text: #e8ecf5;
  --muted: #7a85a0;
  --card: #101626;
  --border: #1e2a45;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* HERO */
.hero-inner {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 80px;
  padding: 120px 60px;
}

/* PHOTO */
.hero-photo-wrap {
  position: relative;
  padding-bottom: 40px; /* FIX SPACE */
}

.photo-ring {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  position: relative;
}

.photo-img {
  width: 100%;
  border-radius: 50%;
}

/* ===== FIXED TAGS ===== */
.photo-float-tag {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 0.7rem;
  color: var(--accent3);
  z-index: 3;
}

/* TOP RIGHT */
.tag-tcs {
  top: -12px;
  right: -10px;
}

/* BOTTOM CENTER */
.tag-exp {
  bottom: -35px;
  left: 50%;
  transform: translateX(-50%);
}

/* STATS */
.stats-row {
  display: flex;
  gap: 40px;
  margin-top: 40px;
}

.stat-num {
  font-size: 2rem;
  font-weight: bold;
}

</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">

    <div>
      <h1>Aryan <span>M M</span></h1>
      <p>TypeScript Developer | Java Full Stack</p>

      <!-- UPDATED STATS -->
      <div class="stats-row">
        <div class="stat">
          <div class="stat-num" data-target="20">0</div>
          <div>TypeScript Modules</div>
        </div>

        <div class="stat">
          <div class="stat-num" data-target="95">0</div>
          <div>Sprint Completion</div>
        </div>

        <div class="stat">
          <div class="stat-num" data-target="30">0</div>
          <div>UAT Defect Reduction</div>
        </div>
      </div>
    </div>

    <!-- PHOTO -->
    <div class="hero-photo-wrap">
      <div class="photo-ring">
        <img src="passport_photo_aryan.jpeg" class="photo-img"/>

        <div class="photo-float-tag tag-tcs">🏢 TCS • Active</div>
        <div class="photo-float-tag tag-exp">📍 Chennai, India</div>
      </div>
    </div>

  </div>
</section>

<script>

/* ===== COUNTING ANIMATION ===== */
const counters = document.querySelectorAll('.stat-num');

const runCounter = (counter) => {
  const target = +counter.getAttribute('data-target');
  let count = 0;

  const update = () => {
    const increment = target / 30;

    if (count < target) {
      count += increment;
      counter.innerText = Math.ceil(count);
      requestAnimationFrame(update);
    } else {
      if (target === 20) counter.innerText = "20+";
      else if (target === 95) counter.innerText = "95%";
      else counter.innerText = target + "%";
    }
  };

  update();
};

/* TRIGGER ON SCROLL */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      runCounter(entry.target);
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.6 });

counters.forEach(counter => {
  observer.observe(counter);
});

</script>

</body>
</html>
